<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="https://hemascorecard.com/includes/images/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/main.css">
    <title>Sword Card Creator</title>
</head>

<body>
    <div class="card-view">
        <div class="card">
            <div class="card-overlay">
                <div class="stat-speed">
                    4
                </div>
                <div class="stat-structure">
                    1
                </div>
                <div class="action-type-icon">
                    <img class="header-icon" src="img/ParryIcon_Both.svg" />
                </div>
                <div class="parry-height-icon">
                    <img class="header-icon" src="img/ParryIcon_High.svg" />
                </div>
                <!-- TODO: Parry height and action type -->
                <div class="header">
                    <div class="card-title">Oberhau</div>
                    <div class="card-subtitle">“Cut From Above”</div>
                </div>
                <div class="divider">
                    <div class="card-category">Cut - Oberhau</div>
                    <div class="card-range">
                        <img class="icon" src="img/ParryIcon_Both.svg" />
                        <div class="card-range-text">1-2</div>
                    </div>
                </div>
                <div class="card-text-container">
                    <p><b>Oberhau</b><span> to the upper opening.</span></p>
                    <p>
                        <img class="icon" src="img/ParryIcon_Both.svg" />
                        <i>Counter Cut.</i> <b>Range 2</b><span>. Defend any Thrust or Cut. Gain </span><b>+2 Structure</b>.
                    </p>
                    <p>
                        <img class="icon" src="img/ParryIcon_Both.svg" />
                        <i>Unrelenting Assault.</i><span> If the opponent parries </span><b>wide</b><span>, attack with this card.</span>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="./app.js"></script>
</body>

</html>
