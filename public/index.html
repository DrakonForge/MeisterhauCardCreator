<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="img/ParryIcon_Both.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/main.css">
    <title>Meisterhau Card Creator</title>
</head>

<body>

    <div class="card-display-output">
        <img class="hidden" src=""/>
    </div>
    <div class="content-wrapper">
        <div class="controls">
            <textarea spellcheck="false" class="json-entry"></textarea>
            <div class="buttons">
                <button class="update-button">Update</button>
                <button class="clear-button">Clear</button>
                <button class="download-button">Download Image</button>
            </div>
        </div>
        <div class="card-view">
            <div class="card">
                <img class="card-border-overlay"></img>
                <img class="card-tier-overlay"></img>
                <div class="card-overlay">
                    <div class="stat-speed stat-speed-text"></div>
                    <div class="stat-speed stat-speed-instant">
                        <img src="img/Instant.svg" />
                    </div>
                    <div class="stat-structure"></div>
                    <div class="action-type-container">
                        <img class="action-type-icon header-icon"/>
                    </div>
                    <div class="parry-height-container">
                        <img class="parry-height-icon header-icon"/>
                    </div>
                    <div class="header">
                        <div class="card-title-container">
                            <div class="card-title"></div>
                        </div>
                        <div class="card-subtitle"></div>
                    </div>
                    <div class="card-art-container">
                        <!-- <img class="card-art" src="img/Art.png" /> -->
                    </div>
                    <div class="divider">
                        <div class="card-type">
                            <div class="card-category"></div>
                        </div>
                        <div class="card-range">
                            <img class="range-icon icon" src="img/RangeIcon.svg" />
                            <div class="card-range-text"></div>
                        </div>
                    </div>
                    <div class="card-body-background-container">
                        <img class="card-body-background-token card-body-background" src="img/TokenIcon.svg" />
                    </div>
                    <div class="card-text-container">
                        <div class="card-text"></div>
                    </div>
                    <div class="card-footer">
                        <!-- <img class="token-icon icon" src="img/TokenIcon.svg" /> -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="./app.js"></script>
</body>

</html>
